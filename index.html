<!DOCTYPE html>
<html>
    <head>
        <title>ShuffleTwo0.2.0</title>   
        <link rel="icon" type="image/x-icon" href="https://javascript.info/article/settimeout-setinterval/settimeout-interval.svg">
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1"> 
           
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>  
        <script src="https://code.jquery.com/ui/1.14.2/jquery-ui.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script> 
        <link href = "Styles/mainStyle.css" type = "text/css" rel = "stylesheet">
    </head>

    <body>    
        <div class = "container-fluid"> 
            <div class = "row">
                <div class = "col col-md-1 d-md-block d-none" ></div> 
                <div class = "col col-md-10 col-sm-12 col-xs-12"> 
                    <header id = "controls">  
                        <div id = "play-pause" class = "d-flex justify-content-center align-items-center">
                            <button type = "button" class = "btn non-primary-button"><img src = "" id = "back-BTN" onclick = "skipBack();"/></button>  
                            <div class = "button-spacer"></div>
                            <button type = "button" class = "btn primary-button"><img src = "" id = "play-pause-BTN" onclick = "playPause()"/></button>  
                            <div class = "button-spacer"></div>
                            <button type = "button" class = "btn non-primary-button"><img src = "" id = "forward-BTN" onclick = "skipForward();"/></button> 
                        </div> 
                        <div id = "time-line" class = "d-flex justify-content-center align-items-center"> 
                            
                            <div id = "time"> 
                                <div id = "main-line"></div>
                            </div>
                        </div>  
                        <div id = "add-files" class = "d-flex justify-content-center align-items-center">  
                            <label for="file-input" id="custom-file-upload" class = "btn">
                                <h1>Add Files</h1> 
                            
                            </label> 
                            <input type = "file" name = "sound" id ="file-input" class = "form-control hide" accept=".mp3" multiple/>
                        
                        
                        </div>  
                    </header>  
                    <main id = "song-files">  
                        <!-- 
                        Audio element structure 
                        <div class = "audioElm d-flex align-items-center">  
                            <button class = "btn"><img src = ""/></button>  
                            <div> 
                                <h2>DEFAULT VALUE.mp3</h2>
                                <div>  
                                    <div></div>
                                </div>
                            </div> 
                        </div>   
                        -->
                    
                        
                        
                        
                    
                    </main> 
                    
                    
                </div> 
                
                <div class = "col col-md-1 d-md-block d-none"></div>    
                <script src = "Scripts/update-time.js"></script>
                <script src = "Scripts/Visualiser.js"></script>
                <script src = "Scripts/addElm.js"></script>
                <script src = "Scripts/InputCheck.js"></script>
                <script src = "Scripts/inputs.js"></script> 
                <script src = "Scripts/checkEnd.js"></script>  
                <script src = "Scripts/nav.js"></script>
            
        </div> 
        
    </body>
</html>
